name: Release Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version to release (without leading v), e.g. 1.2.3"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history + tags so DiffLog can resolve the previous tag (git describe HEAD^).
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install MAUI Windows workload
        run: dotnet workload install maui-windows

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version $VERSION"

      - name: Install DiffLog
        shell: bash
        run: |
          set -euo pipefail
          dotnet tool install -g DiffLog
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Publish (self-contained win-x64)
        shell: bash
        # UseMonoRuntime=false must be a global (-p) property: the maui-windows 10.0.x workload band
        # otherwise resolves the Mono runtime pack (Microsoft.NETCore.App.Runtime.Mono.win-x64) when a
        # RuntimeIdentifier is set, which doesn't exist for .NET 10 and fails restore with NU1102.
        run: |
          set -euo pipefail
          dotnet publish app/Floaty.csproj \
            -c Release \
            -f net10.0-windows10.0.19041.0 \
            -r win-x64 \
            --self-contained true \
            -p:WindowsPackageType=None \
            -p:UseMonoRuntime=false \
            -p:ApplicationDisplayVersion=${{ steps.version.outputs.version }} \
            -o publish

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Generate release notes
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail

          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          CURRENT_REF=HEAD

          if [[ -n "$PREV_TAG" ]]; then
            difflog generate --from "$PREV_TAG" --to "$CURRENT_REF" --format Markdown -o release-notes.md --system-prompt "Generate developer friendly release notes based on this git history information. Include SHA hashes and structure the changelog in bullet points. don't make it too long and don't overcomplicate it. keep it clean (subtle emoji usage is allowed)."
          else
            difflog generate --to "$CURRENT_REF" --format Markdown -o release-notes.md --system-prompt "Generate developer friendly release notes based on this git history information. Include SHA hashes and structure the changelog in bullet points. don't make it too long and don't overcomplicate it. keep it clean (subtle emoji usage is allowed)."
          fi

          if [[ ! -s release-notes.md ]]; then
            echo "Generated release-notes.md is missing or empty." >&2
            exit 1
          fi

      - name: Package with Velopack
        shell: bash
        # --releaseNotes embeds release-notes.md into the package + feed (releases.win.json), so the
        # GitHub Release body (via vpk upload) and the in-app "What's new" section both use it.
        run: |
          set -euo pipefail
          vpk pack \
            --packId Floaty \
            --packVersion ${{ steps.version.outputs.version }} \
            --packDir publish \
            --mainExe Floaty.exe \
            --packTitle Floaty \
            --releaseNotes release-notes.md \
            --outputDir Releases

      - name: Upload to GitHub Releases
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          vpk upload github \
            --repoUrl https://github.com/nor0x/Floaty \
            --publish \
            --releaseName "Floaty ${{ steps.version.outputs.version }}" \
            --tag v${{ steps.version.outputs.version }} \
            --token "$GITHUB_TOKEN"
